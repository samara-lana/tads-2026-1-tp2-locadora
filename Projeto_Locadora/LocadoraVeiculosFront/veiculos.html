<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veículos | Locadora de Veículos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container">
      <div class="page-header">
        <h1>Veículos</h1>
        <button class="btn btn-primary" id="btnNovo">+ Novo veículo</button>
      </div>

      <div class="filtros-bar">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Buscar por modelo ou placa</label>
            <input type="text" class="form-control" id="filtroTexto" placeholder="Ex.: Corolla ou ABC" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Fabricante</label>
            <select class="form-select" id="filtroFabricante">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Disponibilidade</label>
            <select class="form-select" id="filtroDisponivel">
              <option value="">Todos</option>
              <option value="sim">Disponíveis</option>
              <option value="nao">Alugados</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Modelo</th>
                <th>Fabricante</th>
                <th>Categoria</th>
                <th>Ano</th>
                <th>Placa</th>
                <th class="text-end">Diária</th>
                <th>Situação</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="rodape">Locadora de Veículos &middot; Trabalho Prático 2</footer>

    <div class="modal fade" id="modalForm" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form id="formVeiculo">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitulo">Novo veículo</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="campoId" />
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Modelo *</label>
                  <input type="text" class="form-control" id="campoModelo" maxlength="100" required />
                </div>
                <div class="col-md-3 mb-3">
                  <label class="form-label">Ano *</label>
                  <input type="number" class="form-control" id="campoAno" min="1900" max="2100" required />
                </div>
                <div class="col-md-3 mb-3">
                  <label class="form-label">Placa *</label>
                  <input type="text" class="form-control" id="campoPlaca" maxlength="10" required />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Fabricante *</label>
                  <select class="form-select" id="campoFabricante" required></select>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Categoria *</label>
                  <select class="form-select" id="campoCategoria" required></select>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Cor</label>
                  <input type="text" class="form-control" id="campoCor" maxlength="40" />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Quilometragem atual</label>
                  <input type="number" step="0.01" min="0" class="form-control" id="campoKm" />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Valor da diária (R$) *</label>
                  <input type="number" step="0.01" min="0.01" class="form-control" id="campoDiaria" required />
                </div>
                <div class="col-md-4 mb-3 d-flex align-items-end">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="campoDisponivel" checked />
                    <label class="form-check-label" for="campoDisponivel">Disponível para aluguel</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/veiculos.js"></script>
  </body>
</html>
