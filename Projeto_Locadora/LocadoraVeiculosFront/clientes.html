<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes | Locadora de Veículos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container">
      <div class="page-header">
        <h1>Clientes</h1>
        <button class="btn btn-primary" id="btnNovo">+ Novo cliente</button>
      </div>

      <div class="filtros-bar">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Buscar por nome</label>
            <input type="text" class="form-control" id="filtroNome" placeholder="Ex.: Ana" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Buscar por CPF ou e-mail</label>
            <input type="text" class="form-control" id="filtroDocumento" placeholder="Ex.: 111 ou email@..." />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th class="text-end">Saldo</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="rodape">Locadora de Veículos &middot; Trabalho Prático 2</footer>

    <div class="modal fade" id="modalForm" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formCliente">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitulo">Novo cliente</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="campoId" />
              <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" id="campoNome" maxlength="120" required />
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">CPF * (11 dígitos)</label>
                  <input type="text" class="form-control" id="campoCpf" maxlength="11" minlength="11"
                    pattern="\d{11}" title="Digite os 11 dígitos do CPF, somente números" required />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Telefone</label>
                  <input type="text" class="form-control" id="campoTelefone" maxlength="20" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">E-mail *</label>
                <input type="email" class="form-control" id="campoEmail" maxlength="120" required />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/clientes.js"></script>
  </body>
</html>
