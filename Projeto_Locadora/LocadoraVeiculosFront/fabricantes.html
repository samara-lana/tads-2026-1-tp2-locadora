<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabricantes | Locap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container">
      <div class="page-header">
        <h1>Fabricantes</h1>
        <button class="btn btn-primary" id="btnNovo">+ Novo fabricante</button>
      </div>

      <div class="filtros-bar">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Buscar por nome</label>
            <input type="text" class="form-control" id="filtroNome" placeholder="Ex.: Toyota" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Filtrar por país de origem</label>
            <input type="text" class="form-control" id="filtroPais" placeholder="Ex.: Japão" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>País de origem</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="rodape">Locap &middot; Locadora de Veículos &middot; TP2</footer>

    <!-- Modal de cadastro/edição -->
    <div class="modal fade" id="modalForm" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formFabricante">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitulo">Novo fabricante</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="campoId" />
              <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" id="campoNome" maxlength="100" required />
              </div>
              <div class="mb-3">
                <label class="form-label">País de origem</label>
                <input type="text" class="form-control" id="campoPais" maxlength="80" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/fabricantes.js"></script>
  </body>
</html>
